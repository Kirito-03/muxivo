<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/icon-apk.png" />
    <link rel="apple-touch-icon" href="/icon-apk.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/static/css/styles.css?v=8" />
    <title>Muxivo</title>
  </head>
  <body>
    <!-- Global Loader -->
    <div id="global-loader">
      <svg class="global-loader-icon spin-anim" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
        <path d="M988 548c-19.9 0-36-16.1-36-36 0-59.4-11.6-117-34.6-171.3a440.45 440.45 0 0 0-94.3-139.9 437.71 437.71 0 0 0-139.9-94.3C620 83.6 562.4 72 503 72c-19.9 0-36-16.1-36-36s16.1-36 36-36c68.3 0 134.6 13.4 197 39.7 60.2 25.4 114.2 61.7 160.4 107.9s82.5 100.2 107.9 160.4C994.6 370.4 1008 436.7 1008 505c0 19.9-16.1 36-36 36z"/>
      </svg>
    </div>

    <main class="shell">
      <section class="panel">

        <div class="field">
          <div class="url-box">
            <div id="urlLabel" class="url-label">PASTE MEDIA URL</div>
            <textarea id="urlInput" class="url-input" rows="3" placeholder=""></textarea>
            <div id="detectArea" class="url-detect-area" hidden>
              <div id="detectLoader" class="url-detect-line" hidden>
                <span>ANALIZANDO ENLACE</span><span id="detectDots" class="url-dots"></span>
              </div>
              <div id="detectInfo" class="url-detect-line" hidden>
                <span id="detectIcon" class="url-detect-icon" aria-hidden="true"></span>
                <span id="detectPlatform" class="url-detect-platform"></span>
                <span class="url-detect-sep">•</span>
                <span id="detectType" class="url-detect-type"></span>
              </div>
              <div id="detectError" class="url-detect-line url-detect-error" hidden></div>
            </div>
            <div class="url-actions">
              <button id="clearBtn" class="ghost url-clear" type="button" hidden>CLEAR</button>
              <button id="pasteBtn" class="ghost url-paste" type="button">PASTE</button>
            </div>
          </div>
        </div>

        <div class="field" id="imagePicker" hidden>
          <div class="field-label">IMAGES</div>
          <div class="pick-box">
            <div class="pick-actions">
              <button id="pickAllBtn" class="ghost pick-action" type="button">ALL</button>
              <button id="pickNoneBtn" class="ghost pick-action" type="button">NONE</button>
            </div>
            <ul id="imageCandidateList" class="pick-list"></ul>
          </div>
        </div>

        <div class="field">
          <div class="field-label">MEDIA TYPE</div>
          <div class="segmented" role="tablist" aria-label="Media Type">
            <button class="seg-btn is-active" data-kind="audio" type="button" role="tab" aria-selected="true">
              <svg class="seg-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true"><path d="M842 454c0-4.4-3.6-8-8-8h-60c-4.4 0-8 3.6-8 8 0 140.3-113.7 254-254 254S258 594.3 258 454c0-4.4-3.6-8-8-8h-60c-4.4 0-8 3.6-8 8 0 168.7 126.6 307.9 290 327.6V884H326.7c-13.7 0-24.7 14.3-24.7 32v36c0 4.4 2.8 8 6.2 8h407.6c3.4 0 6.2-3.6 6.2-8v-36c0-17.7-11-32-24.7-32H548V782.1c165.3-18 294-158 294-328.1zM512 624c93.9 0 170-75.2 170-168V232c0-92.8-76.1-168-170-168s-170 75.2-170 168v224c0 92.8 76.1 168 170 168z"/></svg>
              <span>AUDIO</span>
            </button>
            <button class="seg-btn" data-kind="video" type="button" role="tab" aria-selected="false">
              <svg class="seg-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true"><path d="M912 302.3L784 376V224c0-35.3-28.7-64-64-64H128c-35.3 0-64 28.7-64 64v576c0 35.3 28.7 64 64 64h592c35.3 0 64-28.7 64-64V648l128 73.7c21.3 12.3 48-3.1 48-27.6V330c0-24.6-26.7-40-48-27.7zM712 792H136V232h576v560zm176-167l-104-59.8V458.9L888 399v226z"/></svg>
              <span>VIDEO</span>
            </button>
            <button class="seg-btn" data-kind="image" type="button" role="tab" aria-selected="false">
              <svg class="seg-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true"><path d="M928 160H96c-17.7 0-32 14.3-32 32v640c0 17.7 14.3 32 32 32h832c17.7 0 32-14.3 32-32V192c0-17.7-14.3-32-32-32zm-40 632H136v-39.9l138.5-164.3 150.1 178L658.1 489 888 761.6V792zm0-129.8L664.2 396.8c-3.2-3.8-9-3.8-12.2 0L424.6 666.4l-144-170.7c-3.2-3.8-9-3.8-12.2 0L136 652.7V232h752v430.2zM304 456a88 88 0 1 0 0-176 88 88 0 0 0 0 176z"/></svg>
              <span>IMAGE</span>
            </button>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <div class="field-label">FORMAT</div>
            <div class="select-wrap">
              <select id="formatSelect" class="select"></select>
              <span class="chev" aria-hidden="true"></span>
            </div>
          </div>
          <div class="field">
            <div class="field-label">QUALITY</div>
            <div class="select-wrap">
              <select id="qualitySelect" class="select"></select>
              <span class="chev" aria-hidden="true"></span>
            </div>
          </div>
        </div>

        <button id="downloadBtn" class="primary" type="button">
          <!-- Normal: DownloadOutlined -->
          <svg id="btnIconNormal" class="btn-icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
            <path d="M505.7 661a8 8 0 0 0 12.6 0l112-141.7c4.1-5.2.4-12.9-6.3-12.9h-74.1V168c0-4.4-3.6-8-8-8h-60c-4.4 0-8 3.6-8 8v338.3H400c-6.7 0-10.4 7.7-6.3 12.9l112 140.8zm143.5 5.7H375c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8h274.2c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8zM880 112H144c-17.7 0-32 14.3-32 32v736c0 17.7 14.3 32 32 32h736c17.7 0 32-14.3 32-32V144c0-17.7-14.3-32-32-32zm-40 728H184V184h656v656z"/>
          </svg>
          <!-- Loading: SyncOutlined (oculto por defecto) -->
          <svg id="btnIconLoading" class="btn-icon d-none" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
            <path d="M168 504.2c1-43.7 10-86.1 26.9-126 17.3-41 42.1-77.7 73.7-109.4S337 212.3 378 195c42.4-17.9 87.4-27 133.9-27s91.5 9.1 133.8 27A341.5 341.5 0 0 1 755 268.8c9.9 9.9 19.2 20.4 27.8 31.4l-60.2 47a8 8 0 0 0 3 14.1l175.7 43c5 1.2 9.9-2.6 9.9-7.7l.8-180.9c0-6.7-7.7-10.5-12.9-6.3l-56.4 44.1C765.8 155.1 646.2 92 511.8 92 282.7 92 96.3 275.6 92 503.8a8 8 0 0 0 8 8.2h60c4.4 0 7.9-3.5 8-7.8zm756 7.8h-60c-4.4 0-7.9 3.5-8 7.8-1 43.7-10 86.1-26.9 126-17.3 41-42.1 77.8-73.7 109.4A341.25 341.25 0 0 1 646 827c-42.3 17.9-87.4 27-133.8 27A341.7 341.7 0 0 1 378 827a341.25 341.25 0 0 1-109.4-73.6 341.8 341.8 0 0 1-27.8-31.4l60.2-47a8 8 0 0 0-3-14.1l-175.7-43c-5-1.2-9.9 2.6-9.9 7.7l-.7 181c0 6.7 7.7 10.5 12.9 6.3l56.4-44.1C258.2 868.9 377.8 932 512.2 932c229.2 0 415.5-183.7 419.8-411.8a8 8 0 0 0-8-8.2z"/>
          </svg>
          <!-- Success: CheckCircleOutlined (oculto por defecto) -->
          <svg id="btnIconSuccess" class="btn-icon d-none" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
            <path d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64zm193.5 301.7l-210.6 292a31.8 31.8 0 0 1-51.7 0L318.5 484.9c-3.8-5.3 0-12.7 6.5-12.7h46.9c10.2 0 19.9 4.9 25.9 13.3l71.2 98.8 157.2-218c6-8.3 15.6-13.3 25.9-13.3H699c6.5 0 10.3 7.4 6.5 12.7z"/>
          </svg>
          <span id="downloadLabel" class="btn-text">DESCARGAR</span>
        </button>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <details class="accordion" id="archiveAcc">
          <summary class="acc-summary">
            <span>ARCHIVE</span>
            <span class="acc-chev" aria-hidden="true"></span>
          </summary>
          <div class="acc-body">
            <div id="archiveEmpty" class="archive-empty">No downloads yet</div>
            <div id="zipRow" class="zip-row"></div>
            <ul id="archiveList" class="file-list"></ul>
            <div id="failures" class="failures"></div>
          </div>
        </details>

        <details class="accordion" id="playbackAcc">
          <summary class="acc-summary">
            <span>PLAYBACK</span>
            <span class="acc-chev" aria-hidden="true"></span>
          </summary>
          <div class="acc-body">
            <div class="playback-top" id="playbackControls" hidden>
              <div class="select-wrap grow">
                <select id="playbackSelect" class="select" disabled></select>
                <span class="chev" aria-hidden="true"></span>
              </div>
              <a id="playbackDownload" class="ghost" href="#" download hidden>DESCARGAR</a>
            </div>
            <div id="playback" class="playback">
              <svg class="play-icon-default" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <polygon points="6,3 20,12 6,21" fill="rgba(255,255,255,0.18)"/>
              </svg>
            </div>
          </div>
        </details>

        <noscript>
          <div class="status is-error">Activa JavaScript para usar la interfaz.</div>
        </noscript>
      </section>
    </main>

    <script src="/static/js/app.js?v=13" defer></script>
    <footer style="text-align: center; padding: 2rem 1rem; color: rgba(255, 255, 255, 0.6); font-size: 0.85rem;">
      &copy; 2026 Muvixo. Todos los derechos reservados.<br/>
      <a href="/terms" style="color: rgba(255, 255, 255, 0.8); text-decoration: underline; margin-top: 0.5rem; display: inline-block;">Términos y Condiciones</a>
    </footer>
  </body>
</html>
