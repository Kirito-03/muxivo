services:
  muxivo_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muxivo_app
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    environment:
      PORT: 7860
      TIKTOK_PHOTO_WORKER_URL: ${TIKTOK_PHOTO_WORKER_URL:-}
      TIKTOK_PHOTO_WORKER_TOKEN: ${TIKTOK_PHOTO_WORKER_TOKEN:-}
      AUTODESTRUCT_INTERVAL_SECONDS: 600
      AUTODESTRUCT_MAX_AGE_SECONDS: 1800
      MAX_SESSION_COUNT: ${MAX_SESSION_COUNT:-5}
      MAX_SESSION_AGE_SECONDS: ${MAX_SESSION_AGE_SECONDS:-1800}
      MAX_DOWNLOADS_SIZE_MB: ${MAX_DOWNLOADS_SIZE_MB:-2048}
      MAX_CONCURRENT_DOWNLOADS: ${MAX_CONCURRENT_DOWNLOADS:-2}
      MAX_REQ_PER_MIN: ${MAX_REQ_PER_MIN:-60}
      HISTORY_MAX_ITEMS: ${HISTORY_MAX_ITEMS:-30}
    ports:
      - "4005:7860"
    volumes:
      - media_downloads:/app/downloads
      - media_previews:/app/preview_cache
      - media_served:/app/served_files
      # Cookies — estructura organizada por plataforma (rw: yt-dlp actualiza cookies)
      - ./cookies:/app/cookies
      # Fallback legacy — archivos sueltos en raíz del VPS
      - ./www.youtube.com_cookies.txt:/app/www.youtube.com_cookies.txt
      - ./www.instagram.com_cookies.txt:/app/www.instagram.com_cookies.txt
      - ./www.tiktok.com_cookies.txt:/app/www.tiktok.com_cookies.txt

volumes:
  media_downloads:
  media_previews:
  media_served:
